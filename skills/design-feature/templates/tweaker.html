<!-- TWEAKER PANEL — inlined by design-feature into every idea mockup. -->
<!-- API: window.Tweaker.register({ title, slug, groups, apply(state, root) }). -->
<!-- Copy button serializes state as { slug, version: 1, choices } JSON. -->
<!-- Icons: VSCode Codicons (MIT) — equivalent to react-icons/vsc names below. -->
<style>
  /* Visual: Markup app styleguide — dark teal-tinted glass (hue 165°),
     Manrope + JetBrains Mono, accent-as-typography (never shouty fill).
     Tokens inlined as literal OKLCH/rgb values (no var()) since the tweaker
     is injected into arbitrary mockups with no token sheet. Theme is
     fixed-dark, like Markup's own toolbar/sidebar over the canvas. */
  .mdtk-tweaker {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 999999;
    min-width: 280px;
    max-width: 360px;
    font: 13px/1.4 "Manrope", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: oklch(82% 0.04 165);
    background: rgb(7 12 15 / 88%);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid oklch(21% 0.025 165);
    border-radius: 12px;
    box-shadow:
      0 14px 32px oklch(0% 0 0 / 0.6),
      0 6px 12px oklch(0% 0 0 / 0.45),
      inset 0 1px 0 oklch(100% 0 0 / 0.06);
    user-select: none;
    overflow: hidden;
  }
  .mdtk-tweaker[data-collapsed="true"] {
    min-width: 0;
    max-width: none;
    width: auto;
  }
  .mdtk-tweaker__header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    background: rgba(255, 255, 255, 0.02);
    border-bottom: 1px solid oklch(17% 0.02 165);
    cursor: grab;
  }
  .mdtk-tweaker[data-collapsed="true"] .mdtk-tweaker__header {
    border-bottom: none;
    padding: 6px 10px;
  }
  .mdtk-tweaker__header:active { cursor: grabbing; }
  .mdtk-tweaker__title {
    flex: 1;
    font-weight: 600;
    letter-spacing: -0.015em;
    color: oklch(97% 0.01 165);
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
  }
  .mdtk-tweaker__title-text {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .mdtk-tweaker__icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    line-height: 0;
  }
  .mdtk-tweaker__icon svg {
    width: 14px;
    height: 14px;
    display: block;
  }
  .mdtk-tweaker__title .mdtk-tweaker__icon {
    color: oklch(74.4% 0.193 165);
  }
  .mdtk-tweaker__title .mdtk-tweaker__icon svg {
    width: 16px;
    height: 16px;
  }
  .mdtk-tweaker__btn {
    appearance: none;
    border: none;
    background: transparent;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 4px;
    color: oklch(60% 0.02 165);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition:
      background 160ms cubic-bezier(0.32, 0.72, 0, 1),
      color 160ms cubic-bezier(0.32, 0.72, 0, 1);
  }
  .mdtk-tweaker__btn:hover {
    background: rgba(255, 255, 255, 0.04);
    color: oklch(97% 0.01 165);
  }
  .mdtk-tweaker__btn:focus-visible {
    outline: none;
    box-shadow:
      0 0 0 2px oklch(11% 0.03 165),
      0 0 0 4px oklch(74.4% 0.193 165);
  }
  .mdtk-tweaker__body {
    padding: 10px;
    max-height: 70vh;
    overflow-y: auto;
  }
  .mdtk-tweaker[data-collapsed="true"] .mdtk-tweaker__body { display: none; }
  .mdtk-tweaker__body::-webkit-scrollbar { width: 6px; }
  .mdtk-tweaker__body::-webkit-scrollbar-track { background: transparent; }
  .mdtk-tweaker__body::-webkit-scrollbar-thumb {
    background: oklch(21% 0.025 165);
    border-radius: 3px;
  }
  .mdtk-tweaker__body::-webkit-scrollbar-thumb:hover { background: oklch(28% 0.025 165); }
  .mdtk-tweaker__group { margin: 10px 0; }
  .mdtk-tweaker__group:first-child { margin-top: 4px; }
  .mdtk-tweaker__group:last-child { margin-bottom: 0; }
  .mdtk-tweaker__group-name {
    font-family: "JetBrains Mono", "SF Mono", "Menlo", "Consolas", ui-monospace, monospace;
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: oklch(47% 0.02 165);
    margin-bottom: 8px;
  }
  .mdtk-tweaker__opt {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 8px;
    align-items: center;
    margin: 6px 0;
  }
  .mdtk-tweaker__opt-label {
    color: oklch(82% 0.04 165);
    font-size: 12px;
  }
  /* Radio group — vertical list, accent-ringed swatch when active.
     Ported from markup's ReplaceToggle (.optRow + .radio). */
  .mdtk-tweaker__radios {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .mdtk-tweaker__radio-row {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 12px;
    color: oklch(82% 0.04 165);
    border-radius: 4px;
    outline: none;
    padding: 2px 0;
  }
  .mdtk-tweaker__radio-input {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
  .mdtk-tweaker__radio-row:focus-within {
    box-shadow: 0 0 0 2px oklch(74.4% 0.193 165 / 0.18);
  }
  .mdtk-tweaker__radio-swatch {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid oklch(47% 0.02 165);
    position: relative;
    flex-shrink: 0;
    transition: border-color 160ms cubic-bezier(0.32, 0.72, 0, 1);
  }
  .mdtk-tweaker__radio-row[data-active="true"] .mdtk-tweaker__radio-swatch {
    border-color: oklch(74.4% 0.193 165);
  }
  .mdtk-tweaker__radio-row[data-active="true"] .mdtk-tweaker__radio-swatch::after {
    content: "";
    position: absolute;
    inset: 2px;
    border-radius: 50%;
    background: oklch(74.4% 0.193 165);
  }
  .mdtk-tweaker__radio-label { flex: 1; }
  /* Range slider — accent-color handles the thumb/track; this block tunes
     track height + thumb size so the slider feels native to the panel. */
  .mdtk-tweaker__range {
    width: 100%;
    accent-color: oklch(74.4% 0.193 165);
    height: 18px;
  }
  .mdtk-tweaker__opt input[type="color"] {
    width: 32px;
    height: 24px;
    background: rgb(39, 39, 39);
    border: 1px solid oklch(21% 0.025 165);
    border-radius: 4px;
    padding: 0;
    cursor: pointer;
  }
  .mdtk-tweaker__opt input[type="checkbox"] {
    width: 14px;
    height: 14px;
    accent-color: oklch(74.4% 0.193 165);
    cursor: pointer;
  }
  .mdtk-tweaker__opt input[type="text"],
  .mdtk-tweaker__opt select {
    width: 100%;
    padding: 4px 8px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid oklch(21% 0.025 165);
    border-radius: 4px;
    color: oklch(82% 0.04 165);
    font: inherit;
    font-size: 12px;
    transition: border-color 160ms cubic-bezier(0.32, 0.72, 0, 1);
  }
  .mdtk-tweaker__opt input[type="text"]:focus,
  .mdtk-tweaker__opt select:focus {
    outline: none;
    border-color: oklch(74.4% 0.193 165);
  }
  .mdtk-tweaker__opt select {
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%23999'><path d='M4 6l4 4 4-4'/></svg>");
    background-repeat: no-repeat;
    background-position: right 6px center;
    background-size: 12px;
    padding-right: 22px;
  }
  .mdtk-tweaker__flash { color: oklch(76% 0.16 152); }
  .mdtk-tweaker__error { color: oklch(70% 0.2 25); }
</style>

<script>
(function () {
  // Tweaker JSON schema version.
  //
  // Forward/backward-compat policy (enforced by the design-feature skill at the
  // Phase 1 approval gate):
  //   - Pasted JSON with `version > VERSION` → skill refuses with
  //     "tweaker template newer than skill, upgrade design-skills".
  //   - Pasted JSON with `version < VERSION` → skill refuses with
  //     "tweaker template older than skill, regenerate the mockup".
  //
  // Bump VERSION whenever the shape of the emitted payload changes
  // (`{ slug, version, choices }`). Bump the matching gate check in
  // skills/design-feature/SKILL.md §"Phase 1 approval gate" together.
  const VERSION = 1;

  // VSCode Codicons (MIT) — names match react-icons/vsc (VscSettingsGear, VscCopy, etc.).
  const ICON = {
    copy: '<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><path d="M3 5V12.73C2.4 12.38 2 11.74 2 11V5C2 2.79 3.79 1 6 1H9C9.74 1 10.38 1.4 10.73 2H6C4.35 2 3 3.35 3 5ZM11 15H6C4.897 15 4 14.103 4 13V5C4 3.897 4.897 3 6 3H11C12.103 3 13 3.897 13 5V13C13 14.103 12.103 15 11 15ZM12 5C12 4.448 11.552 4 11 4H6C5.448 4 5 4.448 5 5V13C5 13.552 5.448 14 6 14H11C11.552 14 12 13.552 12 13V5Z"/></svg>',
    minimize: '<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><path d="M3 7.5C3 7.22386 3.22386 7 3.5 7H12.5C12.7761 7 13 7.22386 13 7.5C13 7.77614 12.7761 8 12.5 8H3.5C3.22386 8 3 7.77614 3 7.5Z"/></svg>',
    maximize: '<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><path d="M2 4.5C2 3.11929 3.11929 2 4.5 2H11.5C12.8807 2 14 3.11929 14 4.5V11.5C14 12.8807 12.8807 14 11.5 14H4.5C3.11929 14 2 12.8807 2 11.5V4.5ZM4.5 3C3.67157 3 3 3.67157 3 4.5V11.5C3 12.3284 3.67157 13 4.5 13H11.5C12.3284 13 13 12.3284 13 11.5V4.5C13 3.67157 12.3284 3 11.5 3H4.5Z"/></svg>',
    warning: '<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><path d="M14.831 11.965L9.206 1.714C8.965 1.274 8.503 1 8 1C7.497 1 7.035 1.274 6.794 1.714L1.169 11.965C1.059 12.167 1 12.395 1 12.625C1 13.383 1.617 14 2.375 14H13.625C14.383 14 15 13.383 15 12.625C15 12.395 14.941 12.167 14.831 11.965ZM13.625 13H2.375C2.168 13 2 12.832 2 12.625C2 12.561 2.016 12.5 2.046 12.445L7.671 2.195C7.736 2.075 7.863 2 8 2C8.137 2 8.264 2.075 8.329 2.195L13.954 12.445C13.984 12.501 14 12.561 14 12.625C14 12.832 13.832 13 13.625 13ZM8.75 11.25C8.75 11.664 8.414 12 8 12C7.586 12 7.25 11.664 7.25 11.25C7.25 10.836 7.586 10.5 8 10.5C8.414 10.5 8.75 10.836 8.75 11.25ZM7.5 9V5.5C7.5 5.224 7.724 5 8 5C8.276 5 8.5 5.224 8.5 5.5V9C8.5 9.276 8.276 9.5 8 9.5C7.724 9.5 7.5 9.276 7.5 9Z"/></svg>',
    check: '<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><path d="M13.6572 3.13573C13.8583 2.9465 14.175 2.95614 14.3643 3.15722C14.5535 3.35831 14.5438 3.675 14.3428 3.86425L5.84277 11.8642C5.64597 12.0494 5.33756 12.0446 5.14648 11.8535L1.64648 8.35351C1.45121 8.15824 1.45121 7.84174 1.64648 7.64647C1.84174 7.45121 2.15825 7.45121 2.35351 7.64647L5.50976 10.8027L13.6572 3.13573Z"/></svg>',
  };

  function iconHTML(name, extraClass) {
    const cls = 'mdtk-tweaker__icon' + (extraClass ? ' ' + extraClass : '');
    return '<span class="' + cls + '" aria-hidden="true">' + ICON[name] + '</span>';
  }

  const root = document.querySelector('[data-mdtk-tweaker]');
  if (!root) return;
  const header = root.querySelector('[data-mdtk-handle]');
  const titleTextEl = root.querySelector('[data-mdtk-title-text]');
  const body = root.querySelector('[data-mdtk-body]');
  const copyBtn = root.querySelector('[data-mdtk-copy]');
  const toggleBtn = root.querySelector('[data-mdtk-toggle]');

  const KEY_POS = 'mdtk-tweaker-pos:' + location.pathname;
  const KEY_COLLAPSED = 'mdtk-tweaker-collapsed:' + location.pathname;
  const KEY_STATE = 'mdtk-tweaker-state:' + location.pathname;

  function lsGet(key) {
    try { return localStorage.getItem(key); } catch (e) { return null; }
  }
  function lsSet(key, val) {
    try { localStorage.setItem(key, val); } catch (e) {}
  }

  let fullTitle = 'Tweaker';
  let shortTitle = 'T';
  function applyTitle() {
    titleTextEl.textContent = root.dataset.collapsed === 'true' ? shortTitle : fullTitle;
  }

  const posRaw = lsGet(KEY_POS);
  if (posRaw) {
    try {
      const pos = JSON.parse(posRaw);
      if (pos) {
        root.style.left = pos.left + 'px';
        root.style.top = pos.top + 'px';
        root.style.right = 'auto';
      }
    } catch (e) { /* JSON malformed */ }
  }

  if (lsGet(KEY_COLLAPSED) === 'true') {
    root.dataset.collapsed = 'true';
    toggleBtn.innerHTML = iconHTML('maximize');
    toggleBtn.title = 'Expand';
    toggleBtn.setAttribute('aria-label', 'Expand');
  }
  applyTitle();

  let dragging = false, offX = 0, offY = 0;
  let didMove = false;
  let downAt = 0;
  function start(e) {
    if (e.target.closest('button, input, select')) return;
    dragging = true;
    didMove = false;
    downAt = Date.now();
    const pt = e.touches ? e.touches[0] : e;
    const rect = root.getBoundingClientRect();
    offX = pt.clientX - rect.left;
    offY = pt.clientY - rect.top;
    document.addEventListener('mousemove', move, { passive: false });
    document.addEventListener('mouseup', end);
    document.addEventListener('touchmove', move, { passive: false });
    document.addEventListener('touchend', end);
  }
  function move(e) {
    if (!dragging) return;
    e.preventDefault();
    didMove = true;
    const pt = e.touches ? e.touches[0] : e;
    const w = root.offsetWidth, h = root.offsetHeight;
    const left = Math.max(0, Math.min(window.innerWidth - w, pt.clientX - offX));
    const top = Math.max(0, Math.min(window.innerHeight - h, pt.clientY - offY));
    root.style.left = left + 'px';
    root.style.top = top + 'px';
    root.style.right = 'auto';
  }
  function end() {
    if (!dragging) return;
    dragging = false;
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', end);
    document.removeEventListener('touchmove', move);
    document.removeEventListener('touchend', end);
    if (didMove) {
      const rect = root.getBoundingClientRect();
      lsSet(KEY_POS, JSON.stringify({ left: rect.left, top: rect.top }));
    } else if (root.dataset.collapsed === 'true' && Date.now() - downAt < 500) {
      setCollapsed(false);
    }
  }
  header.addEventListener('mousedown', start);
  header.addEventListener('touchstart', start, { passive: false });

  function setCollapsed(collapsed) {
    root.dataset.collapsed = String(collapsed);
    toggleBtn.innerHTML = iconHTML(collapsed ? 'maximize' : 'minimize');
    const label = collapsed ? 'Expand' : 'Minimize';
    toggleBtn.title = label;
    toggleBtn.setAttribute('aria-label', label);
    applyTitle();
    lsSet(KEY_COLLAPSED, String(collapsed));
  }
  toggleBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    setCollapsed(root.dataset.collapsed !== 'true');
  });

  let registered = null;
  let state = {};
  const radioRefreshers = new Map();

  function render() {
    if (!registered) return;
    radioRefreshers.clear();
    body.innerHTML = '';
    for (const g of registered.groups) {
      const groupEl = document.createElement('div');
      groupEl.className = 'mdtk-tweaker__group';
      const name = document.createElement('div');
      name.className = 'mdtk-tweaker__group-name';
      name.textContent = g.name;
      groupEl.appendChild(name);
      for (const opt of g.options) {
        const row = document.createElement('div');
        row.className = 'mdtk-tweaker__opt';
        const lbl = document.createElement('div');
        lbl.className = 'mdtk-tweaker__opt-label';
        lbl.textContent = opt.label;
        row.appendChild(lbl);
        row.appendChild(buildControl(opt));
        groupEl.appendChild(row);
      }
      body.appendChild(groupEl);
    }
  }

  function buildControl(opt) {
    if (opt.type === 'radio') {
      const grp = document.createElement('div');
      grp.className = 'mdtk-tweaker__radios';
      grp.setAttribute('role', 'radiogroup');
      grp.setAttribute('aria-label', opt.label || opt.id);
      const rows = [];
      for (const v of opt.values) {
        const row = document.createElement('label');
        row.className = 'mdtk-tweaker__radio-row';
        row.dataset.active = String(state[opt.id] === v);
        const input = document.createElement('input');
        input.type = 'radio';
        input.name = 'mdtk-' + opt.id;
        input.value = String(v);
        input.checked = state[opt.id] === v;
        input.className = 'mdtk-tweaker__radio-input';
        input.addEventListener('change', () => setOption(opt.id, v));
        const swatch = document.createElement('span');
        swatch.className = 'mdtk-tweaker__radio-swatch';
        swatch.setAttribute('aria-hidden', 'true');
        const text = document.createElement('span');
        text.className = 'mdtk-tweaker__radio-label';
        text.textContent = String(v);
        row.appendChild(input);
        row.appendChild(swatch);
        row.appendChild(text);
        grp.appendChild(row);
        rows.push({ row, val: v });
      }
      radioRefreshers.set(opt.id, () => {
        for (const { row, val } of rows) {
          row.dataset.active = String(state[opt.id] === val);
        }
      });
      return grp;
    }
    if (opt.type === 'select') {
      const sel = document.createElement('select');
      for (const v of opt.values) {
        const o = document.createElement('option');
        o.value = String(v);
        o.textContent = String(v);
        if (state[opt.id] === v) o.selected = true;
        sel.appendChild(o);
      }
      sel.addEventListener('change', () => {
        const restored = opt.values.find((v) => String(v) === sel.value);
        setOption(opt.id, restored !== undefined ? restored : sel.value);
      });
      return sel;
    }
    if (opt.type === 'color') {
      const i = document.createElement('input');
      i.type = 'color';
      i.value = state[opt.id];
      i.addEventListener('input', () => setOption(opt.id, i.value));
      return i;
    }
    if (opt.type === 'range') {
      const i = document.createElement('input');
      i.type = 'range';
      i.className = 'mdtk-tweaker__range';
      i.min = opt.min ?? 0;
      i.max = opt.max ?? 100;
      i.step = opt.step ?? 1;
      i.value = state[opt.id];
      i.addEventListener('input', () => setOption(opt.id, Number(i.value)));
      return i;
    }
    if (opt.type === 'text') {
      const i = document.createElement('input');
      i.type = 'text';
      i.value = state[opt.id];
      i.addEventListener('input', () => setOption(opt.id, i.value));
      return i;
    }
    if (opt.type === 'toggle') {
      const i = document.createElement('input');
      i.type = 'checkbox';
      i.checked = !!state[opt.id];
      i.addEventListener('change', () => setOption(opt.id, i.checked));
      return i;
    }
    const span = document.createElement('span');
    span.textContent = '? unsupported type: ' + opt.type;
    return span;
  }

  function setOption(id, value) {
    state[id] = value;
    lsSet(KEY_STATE, JSON.stringify(state));
    applyToRoot();
    const refresh = radioRefreshers.get(id);
    if (refresh) refresh();
  }

  function findApplyRoot() { return document.querySelector('[data-ds-component]'); }

  function applyToRoot() {
    const r = findApplyRoot();
    if (!r || !registered || !registered.apply) return;
    try { registered.apply(state, r); } catch (e) { console.warn('[Tweaker] apply failed:', e); }
  }

  /**
   * Tweaker.register({ title, slug, groups, apply })
   *
   * `apply(state, root)` contract — STRICT.
   *
   * The body of `apply` MUST be limited to direct assignments on `root`:
   *   - attribute writes:  `root.dataset.<id> = state.<id>` / `root.setAttribute(...)`
   *   - inline-style sets: `root.style.setProperty('--<token>', state.<id>)`
   *   - class toggles:     `root.classList.add/remove/toggle(state.<id>)`
   *
   * That is the entire allowed vocabulary. The function MUST NOT:
   *   - call `querySelector` / `querySelectorAll` / `getElementById`
   *   - mutate children (no `appendChild`, `removeChild`, `innerHTML`, `textContent`)
   *   - branch on state (no `if`, no ternary that picks between DOM ops)
   *   - call out to libraries (no jQuery, no fetch, no async)
   *
   * Rationale: this restriction is what makes Phase 2 bake mechanical. The promote
   * step converts each assignment into a literal attribute on the rendered HTML —
   * conditionals or child mutations cannot be statically baked, so they would
   * silently leak design choices past the Phase 1 gate.
   *
   * If a decision can't be expressed in this vocabulary, the decision belongs in
   * the markup itself (model it as a variant via `data-variant="A|B|C"` and let
   * CSS branch).
   */
  window.Tweaker = {
    register({ title, slug, groups, apply }) {
      if (registered) {
        console.warn('[Tweaker] register() called twice; ignoring.');
        return;
      }
      registered = { title, slug, groups, apply };
      if (title) {
        fullTitle = title;
        const rest = title.trim();
        shortTitle = rest.charAt(0).toUpperCase() || 'T';
      }
      applyTitle();
      const defaults = {};
      for (const g of groups) for (const opt of g.options) defaults[opt.id] = opt.default;
      let restored = {};
      const stateRaw = lsGet(KEY_STATE);
      if (stateRaw) {
        try { restored = JSON.parse(stateRaw); } catch (e) {}
      }
      const knownIds = new Set(Object.keys(defaults));
      const filtered = {};
      for (const k of Object.keys(restored)) {
        if (knownIds.has(k)) filtered[k] = restored[k];
      }
      state = Object.assign({}, defaults, filtered);
      lsSet(KEY_STATE, JSON.stringify(state));
      render();
      applyToRoot();
    },
  };

  copyBtn.addEventListener('click', async (e) => {
    e.stopPropagation();
    const originalHTML = copyBtn.innerHTML;
    if (!registered) {
      copyBtn.innerHTML = iconHTML('warning', 'mdtk-tweaker__error');
      setTimeout(() => { copyBtn.innerHTML = originalHTML; }, 1000);
      console.warn('[Tweaker] copy clicked before register()');
      return;
    }
    const payload = {
      slug: registered.slug || '',
      version: VERSION,
      choices: state,
    };
    const text = JSON.stringify(payload, null, 2);
    try {
      await navigator.clipboard.writeText(text);
    } catch (e) {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    copyBtn.innerHTML = iconHTML('check', 'mdtk-tweaker__flash');
    setTimeout(() => { copyBtn.innerHTML = originalHTML; }, 1000);
  });
})();
</script>
